SPECIFICATION Spec

CONSTANTS
    (* Constants for AnomalyAlertModel (Impl) *)
    Impl!Devices = {d1} (* Device IDs *)
    Impl!EventTypes = {"anomaly", "normal_op"} (* Event types *)
    Impl!EventRawData = {"rawData1", "rawData2"} 
    (* Raw event data examples for Impl!EventRawData *)
    Impl!Timestamps = {"T0", "T1"} (* Abstract timestamps for detection *)
    Impl!Reporters = {r1} (* Reporter IDs *)
    Impl!PossibleEventIDs = {id1, id2, id3} (* Abstract set of possible event IDs *)

    (* Constants for Blockchain (Abs) - must be consistent with Impl *)
    Abs!Customers = Impl!Devices (* Customers are the same as devices *)
    Abs!EventTypesStrings = {"anomaly"} (* Event types relevant to blockchain *)

INVARIANTS
    (* Refinement properties *)
    R!InitRefinement
    R!StepRefinement

    (* Re-exported implementation invariants to check *)
    ImplTypeOK
    Consistency_RecordedEventIdMatchesKey
    Consistency_TriggeredImpliesRecorded
    Consistency_RecordedImpliesTriggered
    Consistency_TriggeredInProcessedIds
    Consistency_ProcessedIdsAreUnique
